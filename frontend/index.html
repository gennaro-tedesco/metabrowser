<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>colophon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes/solarized-dark.css">
  <link rel="stylesheet" href="themes/solarized-light.css">
  <link rel="stylesheet" href="themes/catppuccin-mocha.css">
  <link rel="stylesheet" href="themes/catppuccin-latte.css">
  <link rel="stylesheet" href="themes/nord.css">
  <link rel="stylesheet" href="themes/everforest.css">
  <link rel="stylesheet" href="themes/tokyonight.css">
  <link rel="stylesheet" href="themes/kanagawa.css">
  <link rel="stylesheet" href="themes/rose-pine.css">
</head>

	<body>
		<button id="app-menu-toggle" type="button" aria-label="Settings">☰</button>
		<div id="app-menu-panel">
			<div class="app-menu-submenu-wrap">
				<div class="app-menu-row">
					<span class="app-menu-label">Library</span>
					<button type="button" id="app-dir-pick" class="app-dir-btn">Choose…</button>
					<button type="button" id="app-rescan-btn" class="app-dir-btn">Refresh</button>
					<span class="app-menu-chevron">›</span>
				</div>
				<div class="app-submenu" id="app-library-submenu">
					<div class="app-menu-row">
						<span id="app-dir-name" class="app-dir-path">—</span>
					</div>
				</div>
			</div>
			<div class="app-menu-sep"></div>
			<div class="app-menu-submenu-wrap">
				<div class="app-menu-row">
					<span class="app-menu-label">Appearance</span>
					<span class="app-menu-chevron">›</span>
				</div>
				<div class="app-submenu" id="app-appearance-submenu">
					<div class="app-menu-row">
						<span class="app-menu-label">Theme</span>
						<select id="app-theme">
							<option value="solarized-dark">Solarized Dark</option>
							<option value="solarized-light">Solarized Light</option>
							<option value="catppuccin-mocha">Catppuccin Mocha</option>
							<option value="catppuccin-latte">Catppuccin Latte</option>
							<option value="nord">Nord</option>
							<option value="everforest">Everforest</option>
							<option value="tokyonight">Tokyo Night</option>
							<option value="kanagawa">Kanagawa</option>
							<option value="rose-pine">Rose Pine</option>
						</select>
					</div>
					<div class="app-menu-row">
						<span class="app-menu-label">UI font</span>
						<select id="app-font-family">
							<option value="">System default</option>
						</select>
					</div>
					<div class="app-menu-row">
						<span class="app-menu-label">Font size</span>
						<input type="range" id="app-font-slider" min="14" max="28" step="1" value="20">
						<span id="app-font-val">20px</span>
					</div>
				</div>
			</div>
			<div class="app-menu-sep"></div>
			<div class="app-menu-row" id="app-help-row">
				<span class="app-menu-label">Help</span>
			</div>
		</div>
					<aside id="sidebar">
						<button id="sidebar-toggle" type="button" aria-label="Collapse sidebar">‹</button>
						<header class="sidebar-header">
							<img class="logo" src="logo.png" alt="">
						</header>
						<nav id="nav"></nav>
					</aside>
					<div id="sidebar-resizer" aria-hidden="true"></div>
		  <main id="main">
	    <div id="toolbar">
	      <div class="search-wrapper">
	        <div class="search-input-row">
	          <div id="active-filters"></div>
	          <input id="search" type="text" placeholder="search titles, authors…" autocomplete="off">
	          <button id="search-clear" title="Clear search">✕</button>
	        </div>
	      </div>
	      <div id="toolbar-actions">
	        <span id="scan-status" class="hidden" aria-live="polite"></span>
	        <span id="count"></span>
	        <button id="continue-reading" type="button" aria-label="Reader" data-tooltip="reader" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V7"/><path d="m16 12 2 2 4-4"/><path d="M22 6V4a1 1 0 0 0-1-1h-5a4 4 0 0 0-4 4 4 4 0 0 0-4-4H3a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h6a3 3 0 0 1 3 3 3 3 0 0 1 3-3h6a1 1 0 0 0 1-1v-1.3"/></svg></button>
	        <button id="view-toggle" type="button" aria-label="Stats" data-tooltip="stats"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12c.552 0 1.005-.449.95-.998a10 10 0 0 0-8.953-8.951c-.55-.055-.998.398-.998.95v8a1 1 0 0 0 1 1z"/><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/></svg></button>
	      </div>
	    </div>
	    <div id="list"></div>
	    <div id="stats" class="hidden"></div>
	  </main>

  <div id="drilldown-backdrop">
    <div id="drilldown-modal" role="dialog" aria-modal="true">
      <div id="drilldown-header">
        <div id="drilldown-title"></div>
        <button id="drilldown-close" type="button" title="Close">✕</button>
      </div>
      <div id="drilldown-body"></div>
    </div>
  </div>

	  <div id="prefs-backdrop" class="hidden">
	    <div id="prefs-modal" role="dialog" aria-modal="true" aria-label="Preferences">
      <div id="prefs-header">
        <span id="prefs-title">Preferences</span>
        <button id="prefs-close" type="button" title="Close">✕</button>
      </div>
      <div id="prefs-body">
        <div class="prefs-row">
          <label class="prefs-label" for="prefs-library-dir">Library folder</label>
          <div class="prefs-input-row">
            <input id="prefs-library-dir" type="text" class="prefs-input" placeholder="No folder selected" readonly>
            <button id="prefs-pick-dir" type="button" class="prefs-btn">Choose…</button>
          </div>
        </div>
        <div class="prefs-row">
          <label class="prefs-label" for="prefs-font-family">UI font</label>
          <select id="prefs-font-family" class="prefs-input">
            <option value="">System default</option>
          </select>
        </div>
        <div class="prefs-row">
          <label class="prefs-label" for="prefs-font-size">UI font size</label>
          <div class="prefs-input-row">
            <input id="prefs-font-size" type="range" min="14" max="28" step="1" value="20">
            <span id="prefs-font-size-val">20px</span>
          </div>
        </div>
      </div>
      <div id="prefs-footer">
        <button id="prefs-save" type="button" class="prefs-btn prefs-btn-primary">Save</button>
      </div>
	    </div>
	  </div>

	  <div id="help-backdrop" class="hidden">
	    <div id="help-modal" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts">
	      <div id="help-header">
	        <span id="help-title">Keyboard Shortcuts</span>
	        <button id="help-close" type="button" title="Close">✕</button>
	      </div>
	      <div id="help-body">
	        <div class="help-row"><span class="help-keys">↓ / j</span><span class="help-desc">Scroll down</span></div>
	        <div class="help-row"><span class="help-keys">↑ / k</span><span class="help-desc">Scroll up</span></div>
	        <div class="help-row"><span class="help-keys">J</span><span class="help-desc">End of chapter</span></div>
	        <div class="help-row"><span class="help-keys">K</span><span class="help-desc">Beginning of chapter</span></div>
	        <div class="help-row"><span class="help-keys">→ / l</span><span class="help-desc">Next chapter</span></div>
	        <div class="help-row"><span class="help-keys">← / h</span><span class="help-desc">Previous chapter</span></div>
	        <div class="help-row"><span class="help-keys">gg</span><span class="help-desc">First chapter</span></div>
	        <div class="help-row"><span class="help-keys">G</span><span class="help-desc">Last chapter</span></div>
	        <div class="help-row"><span class="help-keys">Tab</span><span class="help-desc">Toggle TOC panel</span></div>
	      </div>
	    </div>
	  </div>

	  <script src="node_modules/chart.js/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
