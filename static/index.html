<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>metabrowser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

	<body>
		<aside id="sidebar">
			<header class="sidebar-header">
				<img class="logo" src="logo.png" alt="">
			</header>
			<button id="view-toggle" type="button"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12c.552 0 1.005-.449.95-.998a10 10 0 0 0-8.953-8.951c-.55-.055-.998.398-.998.95v8a1 1 0 0 0 1 1z"/><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/></svg></button>
			<nav id="nav"></nav>
		</aside>
	  <main id="main">
	    <div id="toolbar">
	      <div class="search-wrapper">
	        <div class="search-input-row">
	          <div id="active-filters"></div>
	          <input id="search" type="text" placeholder="search titles, authors…" autocomplete="off">
	          <button id="search-clear" title="Clear search">✕</button>
	        </div>
	      </div>
	      <span id="count"></span>
	    </div>
	    <div id="list"></div>
	    <div id="stats" class="hidden"></div>
	  </main>

  <div id="drilldown-backdrop">
    <div id="drilldown-modal" role="dialog" aria-modal="true">
      <div id="drilldown-header">
        <div id="drilldown-title"></div>
        <button id="drilldown-close" type="button" title="Close">✕</button>
      </div>
      <div id="drilldown-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
