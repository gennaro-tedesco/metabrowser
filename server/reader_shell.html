<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/theme.css" />
    <link rel="stylesheet" href="/themes/solarized-dark.css" />
    <link rel="stylesheet" href="/themes/solarized-light.css" />
    <link rel="stylesheet" href="/themes/catppuccin-mocha.css" />
    <link rel="stylesheet" href="/themes/catppuccin-latte.css" />
    <link rel="stylesheet" href="/themes/nord.css" />
    <link rel="stylesheet" href="/themes/everforest.css" />
    <link rel="stylesheet" href="/themes/tokyonight.css" />
    <link rel="stylesheet" href="/themes/kanagawa.css" />
    <link rel="stylesheet" href="/themes/rose-pine.css" />
    <link rel="stylesheet" href="/themes/ayu-mirage.css" />
    <link rel="stylesheet" href="/themes/iceberg-light.css" />
    <link rel="stylesheet" href="/reader-assets/reader.css" />
  </head>

  <body
    data-reader-theme="{{.Theme}}"
    data-reader-encoded-path="{{.EncodedPath}}"
    data-reader-current-index="{{.CurrentIndex}}"
    data-reader-chapter-count="{{.ChapterCount}}"
    data-reader-title="{{.Title}}"
  >
    <aside class="reader-sidebar">
      <button
        id="reader-sidebar-toggle"
        class="reader-sidebar-toggle"
        type="button"
        aria-label="Collapse sidebar"
      >
        ❮
      </button>
      <div class="reader-sidebar-header">
        <div class="reader-book-title">{{.Title}}</div>
        {{if .Meta}}
        <div class="reader-book-meta">{{.Meta}}</div>
        {{end}}
      </div>
      <nav id="reader-toc" class="reader-toc">{{.TOCHTML}}</nav>
    </aside>
    <div
      id="reader-sidebar-resizer"
      class="reader-sidebar-resizer"
      aria-hidden="true"
    ></div>
    <main class="reader-main">
      <button
        type="button"
        class="reader-library-action"
        aria-label="Library"
        data-tooltip="library"
        onclick="window.location.href = '/'"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m16 6 4 14" />
          <path d="M12 6v14" />
          <path d="M8 8v12" />
          <path d="M4 4v16" />
        </svg>
      </button>
      <div class="reader-toolbar">
        <div class="reader-toolbar-title">
          <div class="reader-toolbar-heading">
            <span class="reader-toolbar-chapter">{{.CurrentChapter}}</span
            ><span class="reader-progress-badge">{{.Progress}}</span>
          </div>
          <div class="reader-progress-stack" aria-hidden="true">
            <div class="reader-progress-row">
              <svg
                class="reader-progress-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M8 6h10" />
                <path d="M8 12h8" />
                <path d="M8 18h6" />
                <path d="M4 6h.01" />
                <path d="M4 12h.01" />
                <path d="M4 18h.01" />
              </svg>
              <div class="reader-progress-track">
                <div
                  id="reader-chapter-progress-fill"
                  class="reader-progress-fill chapter"
                ></div>
              </div>
            </div>
            <div class="reader-progress-row">
              <svg
                class="reader-progress-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
              </svg>
              <div class="reader-progress-track">
                <div
                  id="reader-book-progress-fill"
                  class="reader-progress-fill book"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="reader-frame-wrap">
        <div id="reader-page-tools" class="reader-page-tools">
          <button
            id="reader-menu-toggle"
            type="button"
            class="reader-menu-toggle"
            aria-label="Reader menu"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="36"
              height="36"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 12h16" />
              <path d="M4 6h16" />
              <path d="M4 18h16" />
            </svg>
          </button>
          <div id="reader-menu-panel" class="reader-menu-panel">
            <div class="reader-controls">
              <div class="reader-control-group" aria-label="Background color">
                <span class="reader-control-symbol"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8z"
                    />
                    <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
                    <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
                    <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
                    <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" /></svg
                ></span>
                <div class="reader-control-bubble">
                  <span
                    id="reader-bg-current"
                    class="reader-current-swatch"
                    style="background: #073541"
                  ></span>
                  <div class="reader-bubble-menu" aria-label="Background color">
                    <button
                      type="button"
                      class="reader-swatch-choice reader-choice-active"
                      data-bg=""
                      aria-label="Background color 1"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-bg=""
                      aria-label="Background color 2"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-bg=""
                      aria-label="Background color 3"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-bg=""
                      aria-label="Background color 4"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-bg=""
                      aria-label="Background color 5"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-bg=""
                      aria-label="Background color 6"
                    ></button>
                  </div>
                </div>
              </div>
              <div class="reader-control-group" aria-label="Text color">
                <span class="reader-control-symbol"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M4 20h16" />
                    <path d="m6 16 6-12 6 12" />
                    <path d="M8 12h8" /></svg
                ></span>
                <div class="reader-control-bubble">
                  <span
                    id="reader-fg-current"
                    class="reader-current-swatch"
                    style="background: #fdf6e2"
                  ></span>
                  <div class="reader-bubble-menu" aria-label="Text color">
                    <button
                      type="button"
                      class="reader-swatch-choice reader-choice-active"
                      data-fg=""
                      aria-label="Text color 1"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-fg=""
                      aria-label="Text color 2"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-fg=""
                      aria-label="Text color 3"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-fg=""
                      aria-label="Text color 4"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-fg=""
                      aria-label="Text color 5"
                    ></button>
                    <button
                      type="button"
                      class="reader-swatch-choice"
                      data-fg=""
                      aria-label="Text color 6"
                    ></button>
                  </div>
                </div>
              </div>
              <div class="reader-control-group" aria-label="Line height">
                <span class="reader-control-symbol"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M12 2v20" />
                    <path d="m8 18 4 4 4-4" />
                    <path d="m8 6 4-4 4 4" /></svg
                ></span>
                <div class="reader-control-bubble">
                  <span id="reader-lh-current" class="reader-current-line"
                    >1.6</span
                  >
                  <div class="reader-bubble-menu" aria-label="Line height">
                    <input
                      type="range"
                      orient="vertical"
                      id="reader-lh-slider"
                      class="reader-slider"
                      min="1.2"
                      max="2.4"
                      step="0.1"
                      value="1.6"
                    />
                  </div>
                </div>
              </div>
              <div class="reader-control-group" aria-label="Font size">
                <span class="reader-control-symbol"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="m15 16 2.536-7.328a1.02 1.02 0 0 1 1.928 0L22 16"
                    />
                    <path d="M15.697 14h5.606" />
                    <path d="m2 16 4.039-9.69a.5.5 0 0 1 .923 0L11 16" />
                    <path d="M3.304 13h6.392" /></svg
                ></span>
                <div class="reader-control-bubble">
                  <span id="reader-size-current" class="reader-current-size"
                    >16</span
                  >
                  <div class="reader-bubble-menu" aria-label="Font size">
                    <input
                      type="range"
                      orient="vertical"
                      id="reader-size-slider"
                      class="reader-slider"
                      min="20"
                      max="48"
                      step="1"
                      value="24"
                    />
                  </div>
                </div>
              </div>
              <div class="reader-control-group" aria-label="Page padding">
                <span class="reader-control-symbol"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M3 12h6" />
                    <path d="M15 12h6" />
                    <path d="m7 8-4 4 4 4" />
                    <path d="m17 8 4 4-4 4" /></svg
                ></span>
                <div class="reader-control-bubble">
                  <span id="reader-pad-current" class="reader-current-size"
                    >72</span
                  >
                  <div class="reader-bubble-menu" aria-label="Page padding">
                    <input
                      type="range"
                      orient="vertical"
                      id="reader-pad-slider"
                      class="reader-slider"
                      min="32"
                      max="160"
                      step="4"
                      value="72"
                    />
                  </div>
                </div>
              </div>
              <div class="reader-control-group" aria-label="Font family">
                <span class="reader-control-symbol"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="4 7 4 4 20 4 20 7" />
                    <line x1="9" x2="15" y1="20" y2="20" />
                    <line x1="12" x2="12" y1="4" y2="20" /></svg
                ></span>
                <div class="reader-control-bubble">
                  <span id="reader-font-current" class="reader-current-line"
                    >Default</span
                  >
                  <div
                    class="reader-bubble-menu reader-font-menu"
                    aria-label="Font family"
                  >
                    <button
                      type="button"
                      class="reader-font-choice reader-choice-active"
                      data-font=""
                    >
                      Default
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="reader-search-tools" class="reader-search-tools">
          <button
            id="reader-search-toggle"
            class="reader-search-toggle"
            type="button"
            aria-label="Search"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="36"
              height="36"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
          <div
            id="reader-search-panel"
            class="reader-menu-panel reader-search-panel"
          >
            <form id="reader-search" class="reader-search" role="search">
              <button
                id="reader-search-scope"
                type="button"
                class="reader-search-scope"
                aria-label="Switch to book search"
                data-tooltip="chapter"
              >
                <svg
                  id="reader-search-scope-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M8 6h10"></path>
                  <path d="M8 12h8"></path>
                  <path d="M8 18h6"></path>
                  <path d="M4 6h.01"></path>
                  <path d="M4 12h.01"></path>
                  <path d="M4 18h.01"></path>
                </svg>
              </button>
              <input
                id="reader-search-input"
                class="reader-search-input"
                type="text"
                placeholder="Search chapter"
                aria-label="Search chapter"
                autocomplete="off"
                spellcheck="false"
              />
              <button
                id="reader-search-reset"
                type="button"
                class="reader-search-input-clear"
                aria-label="Clear search"
              >
                ×
              </button>
              <span
                id="reader-search-count"
                class="reader-search-count"
                aria-live="polite"
              ></span>
              <button
                id="reader-search-prev"
                type="button"
                class="reader-search-nav"
                aria-label="Previous search result"
              >
                ↑
              </button>
              <button
                id="reader-search-next"
                type="button"
                class="reader-search-nav"
                aria-label="Next search result"
              >
                ↓
              </button>
              <button
                id="reader-search-clear"
                type="button"
                class="reader-search-clear"
                aria-label="Close search"
              >
                ×
              </button>
            </form>
          </div>
        </div>
        <div class="reader-frame-stage">
          {{if .Prev}}
          <div class="reader-nav-zone prev">
            <a
              id="reader-prev-chapter"
              class="reader-bottom-nav"
              href="{{.Prev}}"
              aria-label="Previous chapter"
            >
              ❮
            </a>
          </div>
          {{end}} {{if .Next}}
          <div class="reader-nav-zone next">
            <a
              id="reader-next-chapter"
              class="reader-bottom-nav"
              href="{{.Next}}"
              aria-label="Next chapter"
            >
              ❯
            </a>
          </div>
          {{end}}
          <iframe
            id="reader-frame"
            class="reader-frame"
            src="{{.IframeSrc}}"
            title="{{.CurrentChapter}}"
          ></iframe>
        </div>
      </div>
    </main>
    <script src="/reader-assets/reader.js"></script>
  </body>
</html>
